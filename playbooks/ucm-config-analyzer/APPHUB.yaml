# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub detail page (required, max 128 chars)
# -----------------------------------------------------------------------------
tag_line: "Analyze Cisco UCM configuration exports to identify migration clusters before moving to Webex Calling"

# -----------------------------------------------------------------------------
# description — App Hub supports Markdown. Use a block scalar (description: |) with
# blank lines between sections: opening paragraph (bold key terms), **Why use this
# playbook** (3–5 outcome bullets), **What it does** (concrete behaviors/endpoints).
# Do not put upstream repo URLs or install-only instructions here—use README and
# src/README.md for reference playbooks. See docs/commands/import_playbook.md.
# -----------------------------------------------------------------------------
description: |
  A **Python** tool that parses **Cisco UCM** bulk-export TAR files offline and
  produces interactive **Plotly** visualizations to guide your **Webex Calling**
  migration: user dependency clusters, phone readiness, and dial-plan analysis.

  **Why use this playbook**

  - **Know before you migrate:** Identify tightly coupled users — shared lines,
    shared phones, hunt groups, BLF subscriptions — so you can sequence migration
    waves without breaking calling workflows.
  - **Device gap in minutes:** Get a supported-vs-unsupported **Cisco phone** breakdown
    from your actual export data before ordering or planning replacements.
  - **Dial plan clarity:** Visualize **translation patterns**, **CSS combinations**,
    and **route patterns** as interactive charts instead of raw CSV rows.
  - **No live system access needed:** Runs entirely offline against a standard **UCM
    BAT export**; no AXL credentials or network access to UCM are required.
  - **Scriptable foundation:** The `ucmexport.Proxy` class exposes typed containers for
    every UCM object type, making it easy to write custom migration queries.

  **What it does**

  - Parses **UCM BAT export** TAR archives into typed Python objects via the
    `ucmexport` library (phones, end users, hunt pilots, DNs, CSS, locations, etc.).
  - Builds a **user dependency graph** using **NetworkX** — connects users via shared
    phones, shared lines, hunt pilots, BLF subscriptions, and call pickup groups.
  - Renders **Plotly** interactive sunburst, Sankey, and 3D graph charts in the local
    browser for migration readiness review.
  - Provides a CLI utility to **strip sensitive columns** from export CSVs
    (`transform_tar.py`) before sharing archives across teams.

