# APPHUB.yaml — Playbook metadata for Webex App Hub
# Copy this file into your Playbook folder under playbooks/<tool-slug>/
# Fill in all required fields. See CONTRIBUTING.md for field rules.

# -----------------------------------------------------------------------------
# friendly_id — Unique identifier. Must end with -playbook (e.g. epic-ehr-playbook)
# -----------------------------------------------------------------------------
friendly_id: "wxcc-graphql-wallboard-playbook"

# -----------------------------------------------------------------------------
# title — Display name for the Playbook (matches ContentStack field)
# -----------------------------------------------------------------------------
title: "Webex Contact Center — GraphQL reporting wallboard sample"

# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub detail page (required, max 128 chars)
# -----------------------------------------------------------------------------
tag_line: "WxCC Search API wallboard: GraphQL queries and charts for queues, agents, and entry points"

# -----------------------------------------------------------------------------
# description — App Hub listing copy (substantive overview and use case)
# -----------------------------------------------------------------------------
description: |
  Run a small Node.js and Express wallboard that charts Webex Contact Center
  metrics using the documented GraphQL Search API. The sample shows how to
  authenticate with a developer token, scope calls to your org, and render
  call counts by entry point, agent statistics, queue statistics, and active
  task counts. Use it to learn Search query shape and how to wire a browser UI
  to WxCC reporting data before you harden auth and multi-tenant operations.

