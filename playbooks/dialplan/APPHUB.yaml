# -----------------------------------------------------------------------------
# friendly_id — Unique identifier. Must end with -playbook (e.g. epic-ehr-playbook)
# -----------------------------------------------------------------------------
friendly_id: "dialplan-playbook"

# -----------------------------------------------------------------------------
# title — Display name for the Playbook (matches ContentStack field)
# -----------------------------------------------------------------------------
title: "Cisco UCM Dial Plan + Webex Calling Integration"

# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub detail page (required, max 128 chars)
# -----------------------------------------------------------------------------
tag_line: "Migrate ILS-learned dial patterns from Cisco UCM to Webex Calling dial plans automatically"

# -----------------------------------------------------------------------------
# description — 1–2 sentences, used as App Hub listing copy
# -----------------------------------------------------------------------------
description: |
  Migrating from Cisco UCM to Webex Calling means recreating hundreds of ILS-learned dial
  patterns by hand — error-prone and time-consuming. This Playbook automates the entire
  process with a three-step Python CLI pipeline.

  What it does:
  1. Read — queries UCM's ILS pattern tables via the Thin AXL SOAP API and exports to CSV
  2. Normalize — expands bracket notation (e.g. [2-9]XXXXXXX), resolves cross-catalog
     conflicts, and produces a clean pattern list for Webex Calling
  3. Provision — idempotently creates or updates Webex Calling dial plans and patterns
     via the wxc-sdk, adding new patterns and removing obsolete ones on each run

  Requirements: Python 3.10+, a Webex Calling org with admin access, a Webex OAuth
  Integration (client ID + secret), and a Cisco UCM cluster with AXL API access (port 8443).

