# Webex Contact Center OAuth and API base — values from environment (see env.template).
# Register an integration at https://developer.webex.com/create/docs/integrations
response_type=code
client_id=${CLIENT_ID:}
client_secret=${CLIENT_SECRET:}
redirect_uri=${REDIRECT_URI:http://localhost:8080}
scope=${WXCC_OAUTH_SCOPE:cjp:config_read}
state=${OAUTH_STATE:wxcc-capture-sample}
grant_type=authorization_code

# WxCC API cluster for your org (pick one that matches your tenant).
data_center_url=${DATA_CENTER_URL:https://api.wxcc-us1.cisco.com}

# Capture API: expiration of returned recording URLs (minutes).
# https://developer.webex.com/webex-contact-center/docs/api/v1/captures
urlExpiration=${CAPTURE_URL_EXPIRATION_MINUTES:30}
