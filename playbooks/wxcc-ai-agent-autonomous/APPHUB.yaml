# -----------------------------------------------------------------------------
# friendly_id — Unique identifier. Must end with -playbook (e.g. epic-ehr-playbook)
# -----------------------------------------------------------------------------
friendly_id: "wxcc-ai-agent-autonomous-playbook"

# -----------------------------------------------------------------------------
# title — Display name for the Playbook (matches ContentStack field)
# -----------------------------------------------------------------------------
title: "WxCC AI Agent Autonomous Package Tracking"

# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub detail page (required, max 128 chars)
# -----------------------------------------------------------------------------
tag_line: "Deploy a package-tracking autonomous AI agent on Webex Contact Center voice flows with human escalation"

# -----------------------------------------------------------------------------
# description — 1–2 sentences, used as App Hub listing copy
# -----------------------------------------------------------------------------
description: |
  Deploy a no-code autonomous AI agent for inbound package tracking calls on Webex Contact
  Center. Callers ask natural-language questions; the AI agent looks up shipment status using
  a fulfillment action and answers follow-up questions from a knowledge base. On customer
  request or system error, the flow automatically escalates to a human agent queue.

  What you get:
  - Importable WxCC Flow Designer JSON (Virtual Agent V2 + Webex AI Agent Studio)
  - Step-by-step deployment guide from AI Agent Studio setup through live call testing
  - Mermaid architecture diagram and org-specific configuration reference

  What you need:
  - Webex Contact Center org with Webex AI Agent Studio enabled
  - Autonomous AI Agent configured with a package-tracking fulfillment action and knowledge base
  - Entry Point, Queue, and Team configured in Control Hub
  - Cisco Cloud TTS enabled (or a custom static audio file for the error message)

