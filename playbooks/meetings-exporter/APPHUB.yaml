# -----------------------------------------------------------------------------
# logo — URL to your logo image
# -----------------------------------------------------------------------------
logo: "https://developer.webex.com/images/webex-logo.svg"

# -----------------------------------------------------------------------------
# target_persona — Primary audience
# -----------------------------------------------------------------------------
target_persona: "developer"

# -----------------------------------------------------------------------------
# estimated_implementation_time
# -----------------------------------------------------------------------------
