# APPHUB.yaml — Playbook metadata for Webex App Hub
# meetings-exporter: Export Webex meeting data to Google Drive or local storage

# -----------------------------------------------------------------------------
# friendly_id — Unique identifier. Must end with -playbook
# -----------------------------------------------------------------------------
friendly_id: "meetings-exporter-playbook"

# -----------------------------------------------------------------------------
# title — Display name for the Playbook
# -----------------------------------------------------------------------------
title: "Meeting Data Exporter + Webex Meetings Integration"

# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub listing
# -----------------------------------------------------------------------------
tag_line: "Export Webex meeting recordings, transcripts, and AI summaries to Google Drive or local storage"

# -----------------------------------------------------------------------------
# description — 1–2 sentences, used as App Hub listing copy
# -----------------------------------------------------------------------------
description: |
  This Playbook demonstrates how to export Webex meeting data (recordings, transcripts,
  summaries, and action items) to Google Drive or local folders for use with AI tools
  like Gemini, analytics, or archival workflows.

# -----------------------------------------------------------------------------
# categories — App Hub category slugs
# -----------------------------------------------------------------------------
