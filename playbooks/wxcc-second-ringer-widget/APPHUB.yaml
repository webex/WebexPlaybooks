# -----------------------------------------------------------------------------
# friendly_id — Unique identifier. Must end with -playbook (e.g. epic-ehr-playbook)
# -----------------------------------------------------------------------------
friendly_id: "wxcc-second-ringer-widget-playbook"

# -----------------------------------------------------------------------------
# title — Display name for the Playbook (matches ContentStack field)
# -----------------------------------------------------------------------------
title: "Second Ringer Header Widget for Webex Contact Center"

# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub detail page (required, max 128 chars)
# -----------------------------------------------------------------------------
tag_line: "Play a secondary ringtone on a second audio device when agents receive inbound calls in WxCC"

# -----------------------------------------------------------------------------
# description — 1–2 sentences, used as App Hub listing copy
# -----------------------------------------------------------------------------
description: |
  Agents on webRTC telephony often miss inbound calls when not wearing their headset — the ring
  plays through the headset output only. This Playbook shows how to build a WxCC Agent Desktop
  Header Widget that plays a secondary ringtone on any chosen audio output device (e.g. laptop
  speaker) the moment an inbound contact or consult is offered, stopping automatically on answer,
  RONA, or end. Built with @wxcc-desktop/sdk, Lit web components, and the browser Web Audio API
  — no backend server required. Deploy by hosting the Vite-built static bundle and referencing
  it in a WxCC desktop layout's headerActions section.

