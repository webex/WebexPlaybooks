# APPHUB.yaml — wxc_sdk (Python) reference Playbook for Webex APIs / Calling

# -----------------------------------------------------------------------------
# friendly_id — Unique identifier. Must end with -playbook
# -----------------------------------------------------------------------------
friendly_id: "wxc-sdk-playbook"

# -----------------------------------------------------------------------------
# title — Display name for the Playbook
# -----------------------------------------------------------------------------
title: "wxc_sdk (Python) + Webex APIs"

# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub detail page (required, max 128 chars)
# -----------------------------------------------------------------------------
tag_line: "Guide to the wxc_sdk PyPI package for Webex REST APIs with a Calling-focused client library"

# -----------------------------------------------------------------------------
# description — 1–2 sentences, used as App Hub listing copy
# -----------------------------------------------------------------------------
description: |
  This Playbook points developers to the wxc_sdk open source Python SDK on GitHub and PyPI for
  automating documented Webex REST APIs, with emphasis on Webex Calling. It does not vendor the SDK;
  install upstream or use wxc-sdk from PyPI at the pinned version in src/README.md.

