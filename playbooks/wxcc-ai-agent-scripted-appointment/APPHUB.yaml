friendly_id: "wxcc-ai-agent-scripted-appointment-playbook"

# -----------------------------------------------------------------------------
# title — Display name for the Playbook (matches ContentStack field)
# -----------------------------------------------------------------------------
title: "WxCC AI Agent Scripted Doctor's Appointment Booking"

# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub detail page (required, max 128 chars)
# -----------------------------------------------------------------------------
tag_line: "Deploy a scripted AI agent for doctor appointment scheduling on Webex Contact Center with multi-event flow fulfillment"

# -----------------------------------------------------------------------------
# description — 1–2 sentences, used as App Hub listing copy
# -----------------------------------------------------------------------------
description: |
  Deploy a Webex AI Agent Studio scripted agent that handles the full doctor's
  appointment lifecycle — checking availability, booking, looking up, and cancelling
  appointments — over inbound voice calls on Webex Contact Center. No runtime code
  required: everything runs inside a single importable Flow Designer JSON.

  The flow uses a multi-event fulfillment pattern: the AI agent raises one of four
  custom exit events after collecting the caller's details; a Case activity routes to
  the matching HTTP POST, gets the result, and returns it to the agent via a State
  Event — all within a single Virtual Agent V2 activity loop.

  What you get:
  - Importable WxCC Flow Designer JSON — one flow covers all 4 appointment operations
  - Multi-event routing: Case activity branches on StateEventName to the correct HTTP call
  - 4 demo API endpoints: check_availability, create_appointment, lookup_appointment, cancel_appointment
  - Cisco Cloud TTS error message with automatic fallback to escalation queue
  - Single escalation queue handling ESCALATE signals and all HTTP error paths
  - Step-by-step deployment guide: AI Agent Studio → Control Hub → Flow import → live call test

  What you need:
  - Webex Contact Center org with Webex AI Agent Studio enabled
  - Scripted AI Agent using the "Doctor's appointment" importable template in AI Agent Studio
  - One escalation queue and an Entry Point configured in Control Hub
  - Cisco Cloud TTS enabled, or a static audio file for system error messages
  - Appointment management APIs (a Cisco demo API is included for testing)

