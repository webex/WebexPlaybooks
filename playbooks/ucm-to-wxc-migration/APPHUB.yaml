# friendly_id — Unique identifier. Must end with -playbook (e.g. epic-ehr-playbook)
# -----------------------------------------------------------------------------
friendly_id: "ucm-to-wxc-migration-playbook"

# -----------------------------------------------------------------------------
# title — Display name for the Playbook (matches ContentStack field)
# -----------------------------------------------------------------------------
title: "Cisco UCM to Webex Calling Bulk Migration"

# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub detail page (required, max 128 chars)
# -----------------------------------------------------------------------------
tag_line: "Bulk-migrate users from Cisco UCM to Webex Calling using AXL and the Webex Calling SDK"

# -----------------------------------------------------------------------------
# description — 1–2 sentences, used as App Hub listing copy
# -----------------------------------------------------------------------------
description: |
  Migrating from Cisco Unified Communications Manager (UCM) to Webex Calling is time-consuming
  when done user-by-user. This Playbook automates the full ETL pipeline: it reads user records,
  extensions, and DIDs from UCM via the Cisco AXL SOAP API, validates them against available
  Webex Calling licenses and numbers, and bulk-provisions users asynchronously using the wxc_sdk
  Python SDK. Three included tools cover the complete migration workflow — bulk user provisioning
  (main.py), UCM database export to CSV (export_to_csv.py), and ILS dial plan pattern extraction
  for Webex Calling dial plan setup (read_gdpr.py). Designed for UCM administrators and UC
  engineers performing a full-org cutover to Webex Calling cloud telephony.

