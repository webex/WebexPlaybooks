friendly_id: "wxcc-voice-cherry-picker-playbook"

# -----------------------------------------------------------------------------
# title — Display name for the Playbook (matches ContentStack field)
# -----------------------------------------------------------------------------
title: "WxCC Voice Cherry Picker + Webex Contact Center Integration"

# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub detail page (required, max 128 chars)
# -----------------------------------------------------------------------------
tag_line: "Let agents manually select queued voice calls from a custom Agent Desktop widget powered by the WxCC Tasks API"

# -----------------------------------------------------------------------------
# description — 1–2 sentences, used as App Hub listing copy
# -----------------------------------------------------------------------------
description: |
  A custom Webex Contact Center Agent Desktop widget that lets agents manually
  select ("cherry pick") queued voice calls instead of receiving them via
  automatic round-robin distribution. Ideal for teams that route VIP callers,
  language-matched calls, or scheduled callbacks to specific agents.

  **How it works:**
  - A WxCC Flow HTTP Request node sends caller metadata (ANI, DNIS, InteractionId)
    to a lightweight Node.js/Express server on each new inbound call
  - The server caches call data and pushes real-time updates to the Agent Desktop
    widget via Socket.io
  - Agents view a live list of queued callers with ANI/DNIS context and click to
    claim a call using the WxCC Tasks Assignment API

  **Key requirements:**
  - Webex Contact Center org with admin access
  - Service Queue and Multimedia Profile updated via API to enable manuallyAssignable
  - Public HTTPS server to receive webhook callbacks from the WxCC Flow
  - Node.js ≥ 21.5 or Docker

  **What's included:**
  - Node.js server (Express + Socket.io) for call caching and real-time push
  - Frontend widget source (`@wxcc-desktop/sdk`) with webpack build pipeline
  - Importable WxCC Flow (GenericCherryPickerFlow.json)
  - Agent Desktop layout JSON (cherryPickerWidget.json)
  - Docker support for containerized deployment

