# APPHUB.yaml — Playbook metadata for Webex App Hub
# Copy this file into your Playbook folder under playbooks/<tool-slug>/
# Fill in all required fields. See CONTRIBUTING.md for field rules.

# -----------------------------------------------------------------------------
# friendly_id — Unique identifier. Must end with -playbook (e.g. epic-ehr-playbook)
# -----------------------------------------------------------------------------
friendly_id: "graphql-powerbi-sample-playbook"

# -----------------------------------------------------------------------------
# title — Display name for the Playbook (matches ContentStack field)
# -----------------------------------------------------------------------------
title: "Microsoft Power BI + Webex Contact Center (GraphQL Search sample)"

# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub detail page (required, max 128 chars)
# -----------------------------------------------------------------------------
tag_line: "Expose WxCC GraphQL Search results to Microsoft Power BI via a Spring Boot connector endpoint"

# -----------------------------------------------------------------------------
# description — App Hub listing copy (substantive overview and use case)
# -----------------------------------------------------------------------------
description: |
  Use this Playbook to run the official Spring Boot sample that turns Webex Contact
  Center (WxCC) GraphQL Search queries into HTTP responses you can consume from
  Microsoft Power BI or similar reporting tools. You register a Webex integration,
  sign in once through the browser, then point a web data connector at localhost.

  The code demonstrates OAuth against Webex, posting GraphQL to the WxCC Search API,
  and exporting task-oriented results as JSON or CSV. It is sample-grade: tokens
  stay in memory, and nested GraphQL responses may need custom flattening for your
  dashboards.

