# -----------------------------------------------------------------------------
# friendly_id — Unique identifier. Must end with -playbook (e.g. epic-ehr-playbook)
# -----------------------------------------------------------------------------
friendly_id: "ucmaxl-for-wxc-playbook"

# -----------------------------------------------------------------------------
# title — Display name for the Playbook (matches ContentStack field)
# -----------------------------------------------------------------------------
title: "UCM AXL Inventory Export for Webex Calling Migration Planning"

# -----------------------------------------------------------------------------
# tag_line — Short tagline for App Hub detail page (required, max 128 chars)
# -----------------------------------------------------------------------------
tag_line: "Audit UCM phone inventory via AXL SQL and cross-reference with Webex Calling numbers"

# -----------------------------------------------------------------------------
# description — 1–2 sentences, used as App Hub listing copy
# -----------------------------------------------------------------------------
description: |
  This Playbook targets the device side of a UCM-to-Webex Calling migration — the layer most
  migration tools overlook. While other playbooks handle user provisioning, this one inventories
  every phone endpoint in Cisco UCM: model, firmware version, primary directory number (DN),
  device pool, calling search space (CSS), and current registration state. It then cross-references
  each device's line DN against the Webex Calling Numbers API to classify every endpoint as
  MATCH (ready to migrate), NO_MATCH (number not yet in Webex Calling), or NO_DN (unassigned
  device). Output is a per-device CSV report that gives administrators a clear, actionable picture
  of endpoint migration readiness before any cutover begins. Built on the ucmaxl Python library
  (Cisco AXL SOAP via zeep) and the Webex Calling Numbers API. Requires Python 3.10+, an
  AXL-enabled UCM account, and a Webex org admin access token.

