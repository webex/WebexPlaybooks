  # -------------------------------------------------------------------------
  # Stub connector — active by default for smoke testing
  # Replace with a real connector above before connecting to WxCC
  # -------------------------------------------------------------------------
  my_connector:
    type: "my_connector"
    class: "MyConnector"
    module: "connectors.my_connector"
    config:
      agents:
        - "My Agent"

# Monitoring interface (Flask HTTP dashboard)
monitoring:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  metrics_enabled: true
  health_check_interval: 30

# Logging configuration
logging:
  gateway:
    level: "INFO"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: "logs/gateway.log"
    max_size: "10MB"
    backup_count: 5

  web:
    level: "WARNING"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: "logs/web.log"
    max_size: "5MB"
    backup_count: 3

# Session management
sessions:
  timeout: 600
  max_sessions: 1000
  cleanup_interval: 60
  enable_auto_cleanup: true
  max_session_duration: 3600

# Audio processing
audio:
  supported_formats:
    - "wav"
    - "mp3"
    - "flac"
    - "ogg"
