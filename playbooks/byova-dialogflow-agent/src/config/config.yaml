# Webex Contact Center BYOVA Gateway Configuration
# Copy this file as your working config, then fill in your values.
# See config/dialogflow_cx_example.yaml for annotated field reference.

# Gateway gRPC server settings
gateway:
  host: "0.0.0.0"
  port: 50051

# Connectors configuration
# Enable exactly one connector at a time by uncommenting the relevant block.
# See config/dialogflow_cx_example.yaml and config/aws_lex_example.yaml for full options.
