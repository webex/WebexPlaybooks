# Unit tests + actionlint on every PR (separate from validate-then-publish-to-integration.yml).
name: Unit tests and workflow lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1
