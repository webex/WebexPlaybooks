# Unit tests + actionlint on every PR (separate from validate-then-publish-to-integration.yml).
name: Unit tests and workflow lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # rhysd/actionlint is not on the webex org allowlist; run pinned binary from releases instead.
      - name: Lint GitHub Actions workflows
        env:
          ACTIONLINT_VERSION: 1.7.11
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o actionlint.tgz
          tar xzf actionlint.tgz actionlint
          rm -f actionlint.tgz
          ./actionlint -color
