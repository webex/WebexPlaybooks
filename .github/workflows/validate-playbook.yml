name: Validate Playbook

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Playbook folders
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const playbookFolders = new Set();

            for (const file of files.data) {
              const path = file.filename;
              const match = path.match(/^playbooks\/([^/]+)\//);
              if (match) {
                playbookFolders.add(`playbooks/${match[1]}`);
              }
            }

            core.setOutput('folders', [...playbookFolders].join('\n'));
            core.setOutput('count', playbookFolders.size.toString());

      - name: Validate Playbooks
        id: validate
        run: |
          FOLDERS="${{ steps.changed.outputs.folders }}"
          if [ -z "$FOLDERS" ]; then
            echo "No Playbook folders changed. Skipping validation."
            echo "result=pass" >> $GITHUB_OUTPUT
            exit 0
          fi

          VALID_VERTICALS="healthcare|financial-services|retail-ecommerce"
          VALID_PERSONAS="admin|developer|architect"
          FAILED=0
          REPORT=""

          while IFS= read -r FOLDER; do
            [ -z "$FOLDER" ] && continue
            FOLDER_NAME=$(basename "$FOLDER")
            REPORT="${REPORT}## Playbook: \`${FOLDER}\`\n\n"
            FOLDER_FAILED=0

            # README.md exists
            if [ -f "${FOLDER}/README.md" ]; then
              REPORT="${REPORT}- [x] README.md exists\n"
            else
              REPORT="${REPORT}- [ ] README.md exists — *Add README.md with all 6 required sections*\n"
              FOLDER_FAILED=1
            fi

            # README.md contains all 6 required section headers (case-insensitive)
            if [ -f "${FOLDER}/README.md" ]; then
              README_LOWER=$(tr '[:upper:]' '[:lower:]' < "${FOLDER}/README.md")
              MISSING=""
              for SECTION in "use case overview" "architecture" "prerequisites" "code scaffold" "deployment guide" "known limitations"; do
                if ! echo "$README_LOWER" | grep -q "## $SECTION"; then
                  MISSING="${MISSING}${MISSING:+, }$SECTION"
                fi
              done
              if [ -z "$MISSING" ]; then
                REPORT="${REPORT}- [x] README.md contains all 6 required section headers\n"
              else
                REPORT="${REPORT}- [ ] README.md contains all 6 required sections — *Add missing: ${MISSING}*\n"
                FOLDER_FAILED=1
              fi
            fi

            # APPHUB.yaml exists
            if [ -f "${FOLDER}/APPHUB.yaml" ]; then
              REPORT="${REPORT}- [x] APPHUB.yaml exists\n"
            else
              REPORT="${REPORT}- [ ] APPHUB.yaml exists — *Add APPHUB.yaml with all required metadata fields*\n"
              FOLDER_FAILED=1
            fi

            # All required APPHUB.yaml fields present and non-empty
            if [ -f "${FOLDER}/APPHUB.yaml" ]; then
              REQUIRED_FIELDS="friendly_id name description vertical use_case target_persona webex_component third_party_tool estimated_implementation_time author status product_type"
              FIELDS_MISSING=""
              for FIELD in $REQUIRED_FIELDS; do
                LINE=$(grep -E "^${FIELD}:" "${FOLDER}/APPHUB.yaml" 2>/dev/null)
                VALUE=""
                if [ -n "$LINE" ]; then
                  VALUE=$(echo "$LINE" | sed 's/^[^:]*:[[:space:]]*["'\'']*\([^"'\'']*\)["'\'']*[[:space:]]*$/\1/' | tr -d ' ')
                fi
                if [ -z "$LINE" ] || [ -z "$VALUE" ]; then
                  FIELDS_MISSING="${FIELDS_MISSING}${FIELDS_MISSING:+, }${FIELD}"
                fi
              done
              if [ -z "$FIELDS_MISSING" ]; then
                REPORT="${REPORT}- [x] All required APPHUB.yaml fields present and non-empty\n"
              else
                REPORT="${REPORT}- [ ] APPHUB.yaml fields complete — *Fill in: ${FIELDS_MISSING}*\n"
                FOLDER_FAILED=1
              fi
            fi

            # APPHUB.yaml vertical is one of allowed values
            if [ -f "${FOLDER}/APPHUB.yaml" ]; then
              VERTICAL=$(grep -E "^vertical:" "${FOLDER}/APPHUB.yaml" | sed 's/vertical:\s*["'\'']\?\([^"'\'']*\)["'\'']\?.*/\1/' | tr -d ' ')
              if echo "$VERTICAL" | grep -qE "^(healthcare|financial-services|retail-ecommerce)$"; then
                REPORT="${REPORT}- [x] APPHUB.yaml vertical is valid\n"
              else
                REPORT="${REPORT}- [ ] APPHUB.yaml vertical valid — *Use one of: healthcare, financial-services, retail-ecommerce*\n"
                FOLDER_FAILED=1
              fi
            fi

            # APPHUB.yaml webex_component is allowed value
            if [ -f "${FOLDER}/APPHUB.yaml" ]; then
              COMPONENT=$(grep -E "^webex_component:" "${FOLDER}/APPHUB.yaml" | sed 's/webex_component:\s*["'\'']\?\([^"'\'']*\)["'\'']\?.*/\1/' | tr -d ' ')
              if echo "$COMPONENT" | grep -qE "^(Agent Desktop|Flow Builder|AI Agent Studio|Reporting|Messaging|Meetings|Calling|Bots|Webhooks|Device SDK|Embed SDK|Control Hub)$"; then
                REPORT="${REPORT}- [x] APPHUB.yaml webex_component is allowed value\n"
              else
                REPORT="${REPORT}- [ ] APPHUB.yaml webex_component valid — *Use one of: Agent Desktop, Flow Builder, AI Agent Studio, Reporting, Messaging, Meetings, Calling, Bots, Webhooks, Device SDK, Embed SDK, Control Hub*\n"
                FOLDER_FAILED=1
              fi
            fi

            # APPHUB.yaml friendly_id ends with -playbook
            if [ -f "${FOLDER}/APPHUB.yaml" ]; then
              FRIENDLY_ID=$(grep -E "^friendly_id:" "${FOLDER}/APPHUB.yaml" | sed 's/friendly_id:\s*["'\'']\?\([^"'\'']*\)["'\'']\?.*/\1/' | tr -d ' ')
              if echo "$FRIENDLY_ID" | grep -qE '\-playbook$'; then
                REPORT="${REPORT}- [x] APPHUB.yaml friendly_id ends with -playbook\n"
              else
                REPORT="${REPORT}- [ ] APPHUB.yaml friendly_id — *Must end with -playbook (e.g. meetings-exporter-playbook)*\n"
                FOLDER_FAILED=1
              fi
            fi

            # APPHUB.yaml product_type is allowed value
            if [ -f "${FOLDER}/APPHUB.yaml" ]; then
              PRODUCT_TYPE=$(grep -E "^product_type:" "${FOLDER}/APPHUB.yaml" | sed 's/product_type:\s*["'\'']\?\([^"'\'']*\)["'\'']\?.*/\1/' | tr -d ' ')
              if echo "$PRODUCT_TYPE" | grep -qE "^(teams|meetings|calling|rooms|contact_center)$"; then
                REPORT="${REPORT}- [x] APPHUB.yaml product_type is valid\n"
              else
                REPORT="${REPORT}- [ ] APPHUB.yaml product_type valid — *Use one of: teams, meetings, calling, rooms, contact_center*\n"
                FOLDER_FAILED=1
              fi
            fi

            # APPHUB.yaml app_context exists and values are allowed
            if [ -f "${FOLDER}/APPHUB.yaml" ]; then
              if ! grep -qE "^app_context:" "${FOLDER}/APPHUB.yaml"; then
                REPORT="${REPORT}- [ ] APPHUB.yaml app_context — *Add app_context with at least one value*\n"
                FOLDER_FAILED=1
              else
                APP_CONTEXT_LINE=$(grep -E "^app_context:" -A 20 "${FOLDER}/APPHUB.yaml" | grep -E "^\s+-\s+" | head -20)
                APP_CONTEXT_INVALID=""
                VALID_APP_CONTEXTS="space|in_meeting|call|device|contact_center|sidebar|mcp|a2a"
                while IFS= read -r line; do
                  [ -z "$line" ] && continue
                  CTX=$(echo "$line" | sed 's/^[[:space:]]*-\s*["'\'']\?\([^"'\'']*\)["'\'']\?.*/\1/' | tr -d ' ')
                  if [ -n "$CTX" ] && ! echo "$CTX" | grep -qE "^(${VALID_APP_CONTEXTS})$"; then
                    APP_CONTEXT_INVALID="${APP_CONTEXT_INVALID}${APP_CONTEXT_INVALID:+, }${CTX}"
                  fi
                done <<< "$APP_CONTEXT_LINE"
                if [ -z "$APP_CONTEXT_INVALID" ]; then
                  REPORT="${REPORT}- [x] APPHUB.yaml app_context values are valid\n"
                else
                  REPORT="${REPORT}- [ ] APPHUB.yaml app_context valid — *Each value must be one of: space, in_meeting, call, device, contact_center, sidebar, mcp, a2a*\n"
                  FOLDER_FAILED=1
                fi
              fi
            fi

            # APPHUB.yaml target_persona is allowed value
            if [ -f "${FOLDER}/APPHUB.yaml" ]; then
              PERSONA=$(grep -E "^target_persona:" "${FOLDER}/APPHUB.yaml" | sed 's/target_persona:\s*["'\'']\?\([^"'\'']*\)["'\'']\?.*/\1/' | tr -d ' ')
              if echo "$PERSONA" | grep -qE "^(admin|developer|architect)$"; then
                REPORT="${REPORT}- [x] APPHUB.yaml target_persona is valid\n"
              else
                REPORT="${REPORT}- [ ] APPHUB.yaml target_persona valid — *Use one of: admin, developer, architect*\n"
                FOLDER_FAILED=1
              fi
            fi

            # APPHUB.yaml status is not "published"
            if [ -f "${FOLDER}/APPHUB.yaml" ]; then
              STATUS=$(grep -E "^status:" "${FOLDER}/APPHUB.yaml" | sed 's/status:\s*["'\'']\?\([^"'\'']*\)["'\'']\?.*/\1/' | tr -d ' ')
              if [ "$STATUS" = "published" ]; then
                REPORT="${REPORT}- [ ] APPHUB.yaml status not published — *Use \`draft\` or \`review\`; only reviewers set \`published\`*\n"
                FOLDER_FAILED=1
              else
                REPORT="${REPORT}- [x] APPHUB.yaml status is not self-published\n"
              fi
            fi

            # /diagrams/ folder exists
            if [ -d "${FOLDER}/diagrams" ]; then
              REPORT="${REPORT}- [x] /diagrams/ folder exists\n"
            else
              REPORT="${REPORT}- [ ] /diagrams/ folder exists — *Create diagrams/ and add architecture diagram*\n"
              FOLDER_FAILED=1
            fi

            # /scaffold/ folder exists
            if [ -d "${FOLDER}/scaffold" ]; then
              REPORT="${REPORT}- [x] /scaffold/ folder exists\n"
            else
              REPORT="${REPORT}- [ ] /scaffold/ folder exists — *Create scaffold/ with working code*\n"
              FOLDER_FAILED=1
            fi

            # Folder name matches kebab-case (no spaces, no uppercase)
            if echo "$FOLDER_NAME" | grep -qE '^[a-z0-9]+(-[a-z0-9]+)*$'; then
              REPORT="${REPORT}- [x] Folder name is kebab-case\n"
            else
              REPORT="${REPORT}- [ ] Folder name is kebab-case — *Use lowercase, hyphens only (e.g. epic-ehr, servicenow)*\n"
              FOLDER_FAILED=1
            fi

            REPORT="${REPORT}\n"
            if [ $FOLDER_FAILED -eq 1 ]; then
              FAILED=1
            fi
          done <<< "$FOLDERS"

          echo "result=$([ $FAILED -eq 0 ] && echo 'pass' || echo 'fail')" >> $GITHUB_OUTPUT
          echo -e "# Playbook Validation Results\n\n$REPORT" > validation-report.md
          echo "Validation complete. Result: $([ $FAILED -eq 0 ] && echo 'pass' || echo 'fail')"

      - name: Post validation results
        uses: actions/github-script@v7
        if: steps.changed.outputs.count != '0'
        with:
          script: |
            const fs = require('fs');
            const result = '${{ steps.validate.outputs.result }}';
            const body = fs.readFileSync('validation-report.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Playbook Validation Results')
            );

            const commentBody = body + '\n\n---\n*Validation ' + (result === 'pass' ? 'passed' : 'failed') + '.*';

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Fail if validation failed
        if: steps.changed.outputs.count != '0'
        run: |
          if [ "${{ steps.validate.outputs.result }}" = "fail" ]; then
            echo "Validation failed. Fix the issues above and push again."
            exit 1
          fi
